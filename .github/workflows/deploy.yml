name: Deploy Backend to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:   # cho phép trigger thủ công từ GitHub UI

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:
  # ── Job 1: Build & Test ──────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven (skip tests for speed)
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests -q

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  # ── Job 2: Build Docker Image & Push to ECR ──────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${SHORT_SHA}"
          LATEST="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.meta.outputs.tag }} \
            -t ${{ steps.meta.outputs.latest }} \
            .

      - name: Push to ECR
        run: |
          docker push ${{ steps.meta.outputs.tag }}
          docker push ${{ steps.meta.outputs.latest }}

  # ── Job 3: Deploy to EC2 ─────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose.yml
          target: ${{ secrets.APP_DIR }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            APP_DIR="${{ secrets.APP_DIR }}"
            ECR_REGISTRY="${{ secrets.ECR_REGISTRY }}"
            AWS_REGION="${{ secrets.AWS_REGION }}"
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            IMAGE_TAG="${ECR_REGISTRY}/${{ secrets.ECR_REPOSITORY }}:${SHORT_SHA}"
            HEALTH_URL="http://localhost:8080/api/v1/actuator/health"
            HEALTH_RETRIES=15
            HEALTH_SLEEP_SECONDS=5

            print_backend_debug() {
              echo "==> Container status:"
              docker compose ps backend

              echo "==> Backend logs (last 80 lines):"
              docker compose logs --tail=80 backend
            }

            rollback_backend() {
              if [ -n "${OLD_IMAGE}" ]; then
                echo "==> Rolling back to previous image: ${OLD_IMAGE}"
                if grep -q "^BACKEND_IMAGE=" .env; then
                  sed -i "s|^BACKEND_IMAGE=.*|BACKEND_IMAGE=${OLD_IMAGE}|" .env
                else
                  echo "BACKEND_IMAGE=${OLD_IMAGE}" >> .env
                fi

                docker compose up -d --no-deps --pull never backend
                print_backend_debug
              else
                echo "==> No previous BACKEND_IMAGE found, skipping rollback."
                print_backend_debug
              fi
            }

            echo "==> Logging into ECR..."
            aws ecr get-login-password --region "${AWS_REGION}" \
              | docker login --username AWS --password-stdin "${ECR_REGISTRY}"

            echo "==> Pulling new image: ${IMAGE_TAG}"
            docker pull "${IMAGE_TAG}"

            cd "${APP_DIR}"
            OLD_IMAGE=$(grep "^BACKEND_IMAGE=" .env | cut -d= -f2- || true)
            echo "==> Current image in .env: ${OLD_IMAGE:-<empty>}"
            echo "==> New image to deploy: ${IMAGE_TAG}"

            echo "==> Updating BACKEND_IMAGE in .env"
            if grep -q "^BACKEND_IMAGE=" .env; then
              sed -i "s|^BACKEND_IMAGE=.*|BACKEND_IMAGE=${IMAGE_TAG}|" .env
            else
              echo "BACKEND_IMAGE=${IMAGE_TAG}" >> .env
            fi

            echo "==> Updating CORS_ALLOWED_ORIGINS in .env"
            CORS_ORIGINS="${{ secrets.CORS_ALLOWED_ORIGINS }}"
            if [ -n "${CORS_ORIGINS}" ]; then
              if grep -q "^CORS_ALLOWED_ORIGINS=" .env; then
                sed -i "s|^CORS_ALLOWED_ORIGINS=.*|CORS_ALLOWED_ORIGINS=${CORS_ORIGINS}|" .env
              else
                echo "CORS_ALLOWED_ORIGINS=${CORS_ORIGINS}" >> .env
              fi
            fi

            echo "==> Restarting backend container only..."
            docker compose up -d --no-deps --pull never backend

            print_backend_debug

            echo "==> Waiting for backend health endpoint: ${HEALTH_URL}"
            HEALTH_OK=0
            for attempt in $(seq 1 "${HEALTH_RETRIES}"); do
              if curl -sf --max-time 10 "${HEALTH_URL}"; then
                HEALTH_OK=1
                echo
                echo "==> Backend is healthy on attempt ${attempt}/${HEALTH_RETRIES}"
                break
              fi

              echo "==> Health check attempt ${attempt}/${HEALTH_RETRIES} failed, retrying in ${HEALTH_SLEEP_SECONDS}s..."
              sleep "${HEALTH_SLEEP_SECONDS}"
            done

            if [ "${HEALTH_OK}" -ne 1 ]; then
              echo "==> Backend failed health check after ${HEALTH_RETRIES} attempts."
              echo "==> Health endpoint response (status and body):"
              curl -i "${HEALTH_URL}" || true
              rollback_backend
              exit 1
            fi

            echo "==> Cleaning up old images..."
            docker image prune -f

            echo "==> Deploy completed: ${IMAGE_TAG}"
