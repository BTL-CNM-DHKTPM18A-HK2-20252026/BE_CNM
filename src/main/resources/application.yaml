spring:
  application:
    name: fruvia_backend

  data:
    mongodb:
      host: ${MONGODB_HOST:localhost}
      port: ${MONGODB_PORT:27017}
      database: ${MONGODB_DATABASE:fruvia_db}
      auto-index-creation: true
      ddl-auto: update
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2000ms}

  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
    username: ${ELASTICSEARCH_USERNAME:elastic}
    password: ${ELASTICSEARCH_PASSWORD:changeme}
    connection-timeout: ${ELASTICSEARCH_CONNECTION_TIMEOUT:5s}
    socket-timeout: ${ELASTICSEARCH_SOCKET_TIMEOUT:30s}
    restclient:
      sniffer:
        delay-after-failure: ${ELASTICSEARCH_SNIFFER_DELAY:60s}
        interval: ${ELASTICSEARCH_SNIFFER_INTERVAL:5m}

  # Multipart File Upload Configuration
  servlet:
    multipart:
      enabled: true
      max-file-size: ${FILE_MAX_SIZE:10MB}
      max-request-size: ${FILE_MAX_SIZE:10MB}

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: ${SERVER_CONTEXT_PATH:/api/v1}

jwt:
  signer-key: "${JWT_SIGNER_KEY:wDhbSSpxZfV5HKciZOEUlvBExqAuzHmHhLDAuO6PALLAqTP163lNPxLYsUxs3UUI}"
  expiration: ${JWT_EXPIRATION:2592000} # default: 30 days in seconds

# Cloudinary Configuration
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

# CORS Configuration (Web + Mobile App)
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:5173,http://localhost:8081,http://192.168.1.100:8081}
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,PATCH,OPTIONS}
  allowed-headers: ${CORS_ALLOWED_HEADERS:*}
  exposed-headers: ${CORS_EXPOSED_HEADERS:Authorization,Content-Type,X-Total-Count,X-User-Id}
  allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}
  max-age: ${CORS_MAX_AGE:3600}

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: false

dotenv:
  enabled: true

# AWS S3 SDK v2 configuration (Pre-signed URL)
aws:
  s3:
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}
    region: ${AWS_REGION:ap-southeast-1}
    bucket-name: ${AWS_S3_BUCKET_NAME:your-bucket-name}

ai:
  timeout-ms: ${AI_TIMEOUT_MS:30000}
  max-retries: ${AI_MAX_RETRIES:2}
  max-output-tokens: ${AI_MAX_OUTPUT_TOKENS:1000}
  router:
    model: ${AI_ROUTER_MODEL:blackboxai/google/gemini-2.5-flash}
  model:
    chat: ${AI_MODEL_CHAT:claude-sonnet-4-20250514}
    reasoning: ${AI_MODEL_REASONING:o3-pro}
    knowledge: ${AI_MODEL_KNOWLEDGE:gemini-2.5-pro-preview-05-06}
    image: ${AI_MODEL_IMAGE:imagen-4-ultra}
  image:
    provider-url: ${AI_IMAGE_PROVIDER_URL:}
    timeout-ms: ${AI_IMAGE_TIMEOUT_MS:45000}
    read-url-expiry-minutes: ${AI_IMAGE_READ_URL_EXPIRY_MINUTES:10080}
    allow-local-placeholder: ${AI_IMAGE_ALLOW_LOCAL_PLACEHOLDER:true}
    hf-model: ${AI_IMAGE_HF_MODEL:black-forest-labs/FLUX.1-schnell}
    fallback:
      connect-timeout-ms: ${AI_IMAGE_FALLBACK_CONNECT_TIMEOUT_MS:8000}
      read-timeout-ms: ${AI_IMAGE_FALLBACK_READ_TIMEOUT_MS:30000}
      retries: ${AI_IMAGE_FALLBACK_RETRIES:2}
      max-dimension: ${AI_IMAGE_FALLBACK_MAX_DIMENSION:768}
      backoff-ms: ${AI_IMAGE_FALLBACK_BACKOFF_MS:800}
  sliding-window:
    size: ${AI_SLIDING_WINDOW_SIZE:10}
  window-token-budget: ${AI_WINDOW_TOKEN_BUDGET:2000}
  blackbox:
    url: ${BLACKBOX_API_URL:https://api.blackbox.ai/v1/chat/completions}

# Actuator & Prometheus Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: fruvia_backend
