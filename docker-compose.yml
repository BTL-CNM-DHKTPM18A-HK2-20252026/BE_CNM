services:
  # Redis service for QR sessions and caching
  redis:
    image: redis:alpine
    container_name: fruvia-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--maxmemory",
        "128mb",
        "--maxmemory-policy",
        "allkeys-lru",
      ]
    deploy:
      resources:
        limits:
          memory: 192m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # MongoDB service for database
  mongodb:
    image: mongo:7.0
    container_name: fruvia-mongodb
    restart: always
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo_data:/data/db
    # Limit WiredTiger cache to prevent MongoDB from consuming all RAM
    command: ["mongod", "--wiredTigerCacheSizeGB", "0.5"]
    deploy:
      resources:
        limits:
          memory: 768m
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka (KRaft mode — no Zookeeper) ───────────────────────────────────
  kafka:
    image: apache/kafka:3.9.2
    container_name: fruvia-kafka
    restart: always
    ports:
      - "127.0.0.1:9092:9092"
    environment:
      # KRaft single-node setup
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Auto-create topics & retention (reduce retention to save disk I/O)
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_RETENTION_BYTES: 536870912
      KAFKA_LOG_SEGMENT_BYTES: 104857600
      # Single-node: internal topics need replication-factor = 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # KRaft cluster ID
      CLUSTER_ID: "4L6g3nShT-eMCtK--X86sw"
      # Limit JVM heap for Kafka broker
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx256m"
    volumes:
      - kafka_data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Elasticsearch service for search
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: fruvia-elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
      - xpack.security.http.ssl.enabled=false
      - xpack.license.self_generated.type=basic
      # Reduced heap for 8GB EC2 — 384m is enough for light search workload
      - "ES_JAVA_OPTS=-Xms384m -Xmx384m"
      - path.repo=/usr/share/elasticsearch/snapshots
      # Reduce background merges & refresh to save I/O
      - indices.memory.index_buffer_size=10%
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - elasticsearch_snapshots:/usr/share/elasticsearch/snapshots
    deploy:
      resources:
        limits:
          memory: 768m
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -s -u elastic:${ELASTIC_PASSWORD:-changeme} http://localhost:9200/_cluster/health | grep -q ''"status"''',
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Spring Boot Backend ──────────────────────────────────────────────────
  backend:
    image: ${BACKEND_IMAGE}
    container_name: fruvia-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      # Override localhost defaults → use Docker service names
      - MONGODB_HOST=mongodb
      - REDIS_HOST=redis
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ELASTICSEARCH_URIS=http://elasticsearch:9200
      # All secrets come from .env file on the EC2
      - MONGODB_DATABASE=${MONGODB_DATABASE}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET:?ACCESS_TOKEN_SECRET must be set in .env}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET:?REFRESH_TOKEN_SECRET must be set in .env}
      - REFRESH_TOKEN_COOKIE_SECURE=${REFRESH_TOKEN_COOKIE_SECURE:-true}
      - REFRESH_TOKEN_COOKIE_SAME_SITE=${REFRESH_TOKEN_COOKIE_SAME_SITE:-None}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME}
      - EMAIL_USERNAME=${EMAIL_USERNAME}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - EMAIL_FROM=${EMAIL_FROM}
      - BLACKBOX_API_KEY=${BLACKBOX_API_KEY}
      - SWAGGER_ENABLED=false
      # Reduce Tomcat threads for low-traffic EC2
      - TOMCAT_MAX_THREADS=100
      - TOMCAT_MIN_SPARE_THREADS=10
      - TOMCAT_MAX_CONNECTIONS=1024
      - TOMCAT_ACCEPT_COUNT=50
    depends_on:
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1g

volumes:
  redis_data:
  mongo_data:
  kafka_data:
  elasticsearch_data:
  elasticsearch_snapshots:
