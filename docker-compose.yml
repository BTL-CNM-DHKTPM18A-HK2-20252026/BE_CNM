services:
  # Redis service for QR sessions and caching
  redis:
    image: redis:alpine
    container_name: fruvia-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

  # MongoDB service for database
  mongodb:
    image: mongo:latest
    container_name: fruvia-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # Elasticsearch service for search
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: fruvia-elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
      - xpack.security.http.ssl.enabled=false
      - xpack.license.self_generated.type=basic
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      # Snapshot repository path
      - path.repo=/usr/share/elasticsearch/snapshots
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - elasticsearch_snapshots:/usr/share/elasticsearch/snapshots
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -s -u elastic:${ELASTIC_PASSWORD:-changeme} http://localhost:9200/_cluster/health | grep -q ''"status"''',
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  # Kibana — bound to localhost only (not exposed publicly)
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: fruvia-kibana
    restart: always
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:-changeme}
      - xpack.security.enabled=true
    ports:
      - "127.0.0.1:5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

volumes:
  redis_data:
  mongo_data:
  elasticsearch_data:
  elasticsearch_snapshots:
